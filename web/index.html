<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultGuard | Nexus Defense</title>
    <meta name="description" content="Premium Secret Discovery & History Audit Platform.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030307;
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.4);
            --secondary: #7000ff;
            --secondary-glow: rgba(112, 0, 255, 0.4);
            --accent: #ff00ea;
            --text: #ffffff;
            --text-dim: #888899;
            --glass: rgba(10, 10, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --critical: #ff2d55;
            --high: #ff9f0a;
            --medium: #ffd60a;
            --low: #30d158;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Advanced WebGL-style Background --- */
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            perspective: 1000px;
            z-index: -2;
            transform: rotateX(20deg);
            transform-origin: top;
            animation: grid-scroll 20s linear infinite;
        }

        @keyframes grid-scroll {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, var(--primary-glow), transparent 40%),
                radial-gradient(circle at 80% 70%, var(--secondary-glow), transparent 40%);
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: nebula-drift 30s ease-in-out infinite alternate;
        }

        @keyframes nebula-drift {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(5%, 5%); }
        }

        /* --- Typography & Layout --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; position: relative; }

        header {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 4rem 0 3rem; text-align: center;
        }

        .logo-container {
            position: relative; width: 80px; height: 80px; margin-bottom: 1.5rem;
        }

        .logo-glow {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: var(--primary);
            filter: blur(25px); opacity: 0.3; border-radius: 50%;
            animation: pulse-glow 2s ease-in-out infinite alternate;
        }

        .main-logo {
            width: 100%; height: 100%; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
            backdrop-filter: blur(10px);
        }
        .main-logo img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }

        @keyframes pulse-glow { from { opacity: 0.2; transform: scale(0.95); } to { opacity: 0.5; transform: scale(1.1); } }

        h1 {
            font-size: 3.5rem; font-weight: 700; letter-spacing: -0.05em; margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; }

        /* --- The Nexus Input --- */
        .nexus-input-area {
            margin: 4rem auto; max-width: 800px; position: relative;
        }

        .input-glow-border {
            position: absolute; inset: -2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 400%; border-radius: 24px; z-index: -1;
            opacity: 0; transition: opacity 0.4s;
            animation: animate-border 10s linear infinite;
        }

        .nexus-input-area:focus-within .input-glow-border { opacity: 1; filter: blur(5px); }

        @keyframes animate-border { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        .input-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .input-container input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-size: 1.25rem; font-family: 'JetBrains Mono', monospace;
            padding: 0 1rem;
        }
        .input-container input::placeholder { color: #444; }

        .scan-btn {
            background: #fff; color: #000; border: none; border-radius: 16px;
            padding: 0 2.5rem; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .scan-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .scan-btn:active { transform: scale(0.95); }
        .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Digital Stats --- */
        .stats-nexus {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
            margin-bottom: 3rem; display: none;
        }
        .stat-node {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 1.5rem; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-dim); margin-bottom: 0.25rem; }
        .stat-value { font-size: 2.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* --- Analysis Progress --- */
        .analysis-progress {
            margin: 2rem auto; max-width: 600px; display: none;
        }
        .progress-bar-container {
            height: 2px; width: 100%; background: rgba(255,255,255,0.05);
            border-radius: 1px; overflow: hidden; position: relative;
        }
        .progress-bar-fill {
            height: 100%; background: var(--primary); width: 0%;
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.4s ease;
        }
        .status-text {
            font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-top: 1rem;
        }

        /* --- Results Area --- */
        .results-nexus {
            display: flex; flex-direction: column; gap: 1rem;
        }

        .finding-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 1.5rem; position: relative;
            backdrop-filter: blur(10px); animation: node-reveal 0.5s ease-out backwards;
            transition: transform 0.3s, border-color 0.3s;
        }
        .finding-card:hover { transform: translateX(10px); border-color: rgba(255,255,255,0.3); }

        @keyframes node-reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .severity-tag {
            padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.6rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .sev-critical { background: rgba(255, 45, 85, 0.2); color: var(--critical); border: 1px solid var(--critical); }
        .sev-high { background: rgba(255, 159, 10, 0.2); color: var(--high); border: 1px solid var(--high); }
        .sev-medium { background: rgba(255, 214, 10, 0.2); color: var(--medium); border: 1px solid var(--medium); }
        .sev-low { background: rgba(48, 209, 88, 0.2); color: var(--low); border: 1px solid var(--low); }

        .finding-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
        .finding-file { font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--text-dim); }

        .finding-meta {
            display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-top: 1rem;
            padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .meta-block { display: flex; flex-direction: column; gap: 0.25rem; }
        .meta-label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-dim); }
        .meta-value { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .empty-nexus { padding: 8rem 0; text-align: center; opacity: 0.4; }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #000;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.1em; }
        
        /* Digital Noise Overlay */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjY1Ii8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI24pIi8+PC9zdmc+');
            opacity: 0.03; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="cyber-grid"></div>
    <div class="nebula"></div>

    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-glow"></div>
                <div class="main-logo">
                    <img src="/favicon.png" alt="VaultGuard Logo">
                </div>
            </div>
            <h1>NEXUS DEFENSE</h1>
            <p class="subtitle">Autonomous Secret Discovery & History Audit. Enter a repository URL to begin deep neural analysis.</p>
        </header>

        <section class="nexus-input-area">
            <div class="input-glow-border"></div>
            <div class="input-container">
                <input type="text" id="repoPath" placeholder="paste github url or local path..." spellcheck="false" autocomplete="off">
                <button class="scan-btn" id="scanBtn" onclick="initiateNexusAnalysis()">
                    <span>AUDIT</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
                </button>
            </div>
        </section>

        <div class="analysis-progress" id="progressArea">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progFill"></div>
            </div>
            <div class="status-text" id="statusMsg">ESTABLISHING NEXUS LINK...</div>
        </div>

        <div class="stats-nexus" id="statsGrid">
            <div class="stat-node">
                <div class="stat-label" style="color:var(--critical)">CRITICAL</div>
                <div class="stat-value" id="stat-critical" style="color:var(--critical)">0</div>
            </div>
            <div class="stat-node">
                <div class="stat-label" style="color:var(--high)">HIGH</div>
                <div class="stat-value" id="stat-high" style="color:var(--high)">0</div>
            </div>
            <div class="stat-node">
                <div class="stat-label" style="color:var(--medium)">MEDIUM</div>
                <div class="stat-value" id="stat-medium" style="color:var(--medium)">0</div>
            </div>
            <div class="stat-node">
                <div class="stat-label" style="color:var(--low)">LOW</div>
                <div class="stat-value" id="stat-low" style="color:var(--low)">0</div>
            </div>
        </div>

        <div class="results-nexus" id="resultsArea">
            <div class="empty-nexus" id="emptyState">
                <div class="empty-icon">🛡️</div>
                <p>VaultGuard Systems Online. Waiting for Input.</p>
            </div>
        </div>

        <footer>
            VAULTGUARD NEXUS v3.1.0 // 100% LOCAL // END-TO-END SECURITY
        </footer>
    </div>

    <script>
        async function initiateNexusAnalysis() {
            const path = document.getElementById('repoPath').value.trim();
            if (!path) return;

            const btn = document.getElementById('scanBtn');
            const progArea = document.getElementById('progressArea');
            const fill = document.getElementById('progFill');
            const msg = document.getElementById('statusMsg');
            const results = document.getElementById('resultsArea');
            const stats = document.getElementById('statsGrid');
            const empty = document.getElementById('emptyState');

            // Reset UI
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';
            progArea.style.display = 'block';
            empty.style.display = 'none';
            stats.style.display = 'none';
            results.innerHTML = '';
            fill.style.width = '0%';

            const messages = [
                "Establishing secure nexus link...",
                "Cloning remote objects...",
                "Traversing Git tree history...",
                "Running multi-threaded analysis...",
                "Evaluating entropy patterns...",
                "Comparing against 2,000+ signatures...",
                "Deduplicating findings...",
                "Finalizing security report..."
            ];

            let mIdx = 0;
            const msgInterval = setInterval(() => {
                msg.innerText = messages[mIdx % messages.length];
                mIdx++;
                let prog = (mIdx / messages.length) * 90;
                fill.style.width = Math.min(prog, 98) + '%';
            }, 1200);

            try {
                // FORCE: Always Deep, Always Concurrent (Engine handles Concurrency in pkg)
                const res = await fetch(`/api/scan?path=${encodeURIComponent(path)}&deep=true`);
                const data = await res.json();

                clearInterval(msgInterval);
                fill.style.width = '100%';
                msg.innerText = "Audit Complete.";

                setTimeout(() => {
                    progArea.style.display = 'none';
                    renderNexusResults(data.findings || []);
                    btn.disabled = false;
                    btn.innerHTML = '<span>AUDIT</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>';
                }, 800);
            } catch (err) {
                clearInterval(msgInterval);
                msg.innerText = "NEXUS LINK FAILURE";
                msg.style.color = "var(--critical)";
                btn.disabled = false;
            }
        }

        function renderNexusResults(findings) {
            const results = document.getElementById('resultsArea');
            const stats = document.getElementById('statsGrid');
            
            const counts = { critical: 0, high: 0, medium: 0, low: 0 };
            findings.forEach(f => {
                const s = (f.severity || f.Severity || "low").toLowerCase();
                counts[s]++;
            });

            document.getElementById('stat-critical').innerText = counts.critical;
            document.getElementById('stat-high').innerText = counts.high;
            document.getElementById('stat-medium').innerText = counts.medium;
            document.getElementById('stat-low').innerText = counts.low;
            
            stats.style.display = 'grid';

            if (findings.length === 0) {
                results.innerHTML = `
                    <div class="empty-nexus">
                        <div class="empty-icon" style="color:var(--low)">✅</div>
                        <p style="color:var(--low); font-weight:700;">REPOSITY SECURE. NO LEAKS DETECTED.</p>
                    </div>`;
                return;
            }

            findings.forEach((f, i) => {
                const sev = (f.severity || f.Severity || "low").toLowerCase();
                const card = document.createElement('div');
                card.className = 'finding-card';
                card.style.animationDelay = (i * 0.1) + 's';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="finding-title">${f.description || f.Description}</div>
                            <div class="finding-file">${f.file || f.File}:${f.line_number || f.LineNumber}</div>
                        </div>
                        <span class="severity-tag sev-${sev}">${sev}</span>
                    </div>
                    <div class="finding-meta">
                        <div class="meta-block">
                            <span class="meta-label">MATCHED PATTERN</span>
                            <span class="meta-value">${escapeHtml(f.match || f.Match)}</span>
                        </div>
                        <div class="meta-block">
                            <span class="meta-label">COMMIT HASH</span>
                            <span class="meta-value">${(f.commit || f.Commit).substring(0, 12)}</span>
                        </div>
                    </div>
                `;
                results.appendChild(card);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key listeners
        document.getElementById('repoPath').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') initiateNexusAnalysis();
        });
    </script>
</body>
</html>
